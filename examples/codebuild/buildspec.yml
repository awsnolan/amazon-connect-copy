version: 0.2

# Amazon Connect DR Toolkit — CodeBuild Pipeline
#
# This buildspec runs a full DR restore cycle:
#   1. Back up the target instance (pre-restore state)
#   2. Plan the restore (diff source vs target)
#   3. Execute the restore (dry-run first, then live)
#   4. Back up the target instance again (post-restore state)
#   5. Validate the restore
#
# Prerequisites:
#   - Source backup already in the source_dir (from a prior backup run or S3)
#   - CodeBuild service role has Connect/Lambda/Lex permissions on target account
#   - Target instance exists and is ACTIVE

env:
  variables:
    LANG: "en_GB.UTF-8"
    # Path to pre-existing source instance backup
    source_dir: "src/source_instance_backup"
    # Target instance ID (the DR instance to restore into)
    target_instance_id: ""
    # AWS profile for target account (if cross-account; leave empty for same-account)
    target_profile: ""
    # Lambda prefix remapping (if different between accounts)
    lambda_prefix_a: ""
    lambda_prefix_b: ""
    # Lex bot prefix remapping (if different between accounts)
    lex_bot_prefix_a: ""
    lex_bot_prefix_b: ""

phases:
  install:
    commands:
      - jq --version
      - aws --version
      - echo "All prerequisites available"

  pre_build:
    commands:
      # Validate target is ready
      - |
        profile_flag=""
        [ -n "$target_profile" ] && profile_flag="--target-profile $target_profile"
        bin/connect_validate -m preflight --target "$target_instance_id" $profile_flag "$source_dir"

      # Back up target instance (pre-restore baseline)
      - |
        backup_profile=""
        [ -n "$target_profile" ] && backup_profile="-p $target_profile"
        bin/connect_backup $backup_profile artifacts/pre-build/target

      # Plan the restore
      - |
        plan_args=""
        [ -n "$lambda_prefix_a" ] && plan_args="$plan_args -l ${lambda_prefix_a}=${lambda_prefix_b}"
        [ -n "$lex_bot_prefix_a" ] && plan_args="$plan_args -b ${lex_bot_prefix_a}=${lex_bot_prefix_b}"
        bin/connect_plan -f $plan_args "$source_dir" artifacts/pre-build/target artifacts/helper

  build:
    commands:
      # Dry-run first
      - bin/connect_restore -d --verbose artifacts/helper

      # Execute restore
      - bin/connect_restore artifacts/helper

  post_build:
    commands:
      # Back up target instance (post-restore state)
      - |
        backup_profile=""
        [ -n "$target_profile" ] && backup_profile="-p $target_profile"
        bin/connect_backup $backup_profile artifacts/post-build/target

      # Validate the restore
      - |
        profile_flag=""
        [ -n "$target_profile" ] && profile_flag="--target-profile $target_profile"
        bin/connect_validate -m full -j --target "$target_instance_id" $profile_flag "$source_dir" \
          > artifacts/validation.json || true

      # Print human-readable summary
      - |
        profile_flag=""
        [ -n "$target_profile" ] && profile_flag="--target-profile $target_profile"
        bin/connect_validate -m full --target "$target_instance_id" $profile_flag "$source_dir" || true

artifacts:
  files:
    - "**/*"
  base-directory: artifacts
