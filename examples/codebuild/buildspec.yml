version: 0.2

# Repository directory structure
# .
# ├── bin
# │   ├── connect_backup
# │   ├── connect_plan
# │   ├── connect_restore
# │   └── connect_validate
# ├── buildspec.yml
# └── src
#     └── source_dir_saved_by_connect_backup

# Artifacts directory structure
# artifacts
# ├── post-build
# │   ├── target_instance_alias
# │   └── target_instance_alias.log
# ├── pre-build
# │   ├── target_instance_alias
# │   └── target_instance_alias.log
# ├── helper
# │   ├── ...
# │   └── ...
# └── validation.json

env:
  variables:
    LANG: "en_GB.UTF-8"
    source_dir: "src/source_dir_saved_by_connect_backup"
    target_dir: "artifacts/pre-build/target_instance_alias"
    target_post_build_dir: "artifacts/post-build/target_instance_alias"
    helper: "artifacts/helper"
    source_lambda_prefix: "source-lambda-prefix-"
    target_lambda_prefix: "target-lambda-prefix-"
    # contact_flow_prefix: "in_scope_contact_flow_prefix"
    # backup_options: "-G component_prefix_to_ignore"
phases:
  install:
    commands:
      - jq --version
      - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      - unzip awscliv2.zip &> /dev/null
      - ./aws/install -b /usr/local/bin/sbt/bin
  pre_build:
    commands:
      - bin/connect_backup $backup_options "$target_dir" "" "$contact_flow_prefix"
      - bin/connect_plan "$source_dir" "$target_dir" "$helper" "$source_lambda_prefix" "$target_lambda_prefix"
  build:
    commands:
      - bin/connect_restore -d "$helper"
      - test $? -ne 0 && echo "No updates" || bin/connect_restore "$helper"
  post_build:
    commands:
      - bin/connect_backup $backup_options "$target_post_build_dir" "" "$contact_flow_prefix"
      - bin/connect_validate -m full -j "$source_dir" > artifacts/validation.json || true
artifacts:
  files:
    - "**/*"
  base-directory: artifacts
